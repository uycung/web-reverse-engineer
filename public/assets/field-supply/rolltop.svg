<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 500" width="100%" height="100%">
  <!-- Definitions for shadows and patterns -->
  <defs>
    <filter id="subtle-shadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="8" stdDeviation="12" flood-color="#1c1b1a" flood-opacity="0.06" />
    </filter>
    <pattern id="grid-pattern" width="20" height="20" patternUnits="userSpaceOnUse">
      <path d="M 20 0 L 0 0 0 20" fill="none" stroke="#e8e4da" stroke-width="1" />
    </pattern>
  </defs>

  <!-- Canvas Background -->
  <rect width="100%" height="100%" fill="#faf8f5" />
  <rect width="100%" height="100%" fill="url(#grid-pattern)" opacity="0.5" />

  <!-- Center Group -->
  <g transform="translate(20, 20)">
    <!-- Shadow Base -->
    <rect x="75" y="70" width="210" height="360" rx="20" fill="#e8e4da" opacity="0.3" filter="url(#subtle-shadow)" />

    <!-- Rolltop Main Body -->
    <rect x="75" y="110" width="210" height="320" rx="16" fill="#f0ede6" stroke="#d6d0c2" stroke-width="2" />
    
    <!-- Rolled Top Part -->
    <path d="M 68 110 L 292 110 C 292 110, 298 90, 290 80 C 280 70, 260 72, 210 72 C 160 72, 140 70, 110 80 C 102 90, 68 110, 68 110 Z" fill="#e3ded5" stroke="#d6d0c2" stroke-width="2" />
    <ellipse cx="180" cy="88" rx="112" ry="12" fill="#faf8f5" stroke="#d6d0c2" stroke-width="1.5" />
    
    <!-- Side Compression Straps (Olive) -->
    <rect x="68" y="190" width="12" height="16" rx="2" fill="#596547" />
    <line x1="80" y1="198" x2="105" y2="198" stroke="#596547" stroke-width="2" />
    
    <rect x="68" y="290" width="12" height="16" rx="2" fill="#596547" />
    <line x1="80" y1="298" x2="105" y2="298" stroke="#596547" stroke-width="2" />

    <rect x="280" y="190" width="12" height="16" rx="2" fill="#596547" />
    <line x1="280" y1="198" x2="255" y2="198" stroke="#596547" stroke-width="2" />

    <rect x="280" y="290" width="12" height="16" rx="2" fill="#596547" />
    <line x1="280" y1="298" x2="255" y2="298" stroke="#596547" stroke-width="2" />

    <!-- Center Closing Strap (Olive) -->
    <rect x="172" y="88" width="16" height="240" fill="#596547" rx="3" />
    
    <!-- Buckle (Clay Accent) -->
    <g transform="translate(168, 140)">
      <rect x="0" y="0" width="24" height="20" rx="4" fill="#b85d3b" stroke="#faf8f5" stroke-width="1.5" />
      <line x1="4" y1="10" x2="20" y2="10" stroke="#faf8f5" stroke-width="2" />
    </g>

    <!-- Side Pocket (Right) -->
    <path d="M 285 260 L 285 380 C 285 380, 275 390, 260 390 L 260 260 Z" fill="#e3ded5" stroke="#d6d0c2" stroke-width="1.5" />
    <line x1="260" y1="260" x2="285" y2="260" stroke="#596547" stroke-width="2" />

    <!-- Bottom Protection Overlay -->
    <path d="M 77 390 C 110 400, 250 400, 283 390 L 283 414 C 283 424, 265 430, 245 430 L 115 430 C 95 430, 77 424, 77 414 Z" fill="#596547" fill-opacity="0.15" stroke="#596547" stroke-width="2" />

    <!-- Brand / Technical Spec Label -->
    <text x="96" y="240" font-family="monospace" font-size="7" fill="#8e8a82" letter-spacing="1">FIELD SUPPLY // CO</text>
    <text x="96" y="252" font-family="monospace" font-size="9" font-weight="bold" fill="#2d2c2a" letter-spacing="0.5">ALL-WEATHER ROLLTOP</text>
    <text x="96" y="264" font-family="monospace" font-size="8" fill="#b85d3b" font-weight="bold">SPEC.03 / 28L</text>
  </g>
</svg>
